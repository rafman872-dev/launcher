name: Fetch IGDB Covers

on:
  workflow_dispatch:
  schedule:
    # weekly on Sunday at 03:00 UTC
    - cron: '0 3 * * 0'

jobs:
  fetch-covers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run fetch_covers (IGDB)
        env:
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: |
          echo "Running fetch_covers.js with IGDB provider"
          node scripts/fetch_covers.js igdb --force

      - name: Commit & push covers if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add covers || true
          git add games.json || true
          if ! git diff --cached --quiet; then
            git commit -m "CI: Update IGDB covers (automated)\n\nCo-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>" || true
            git push
          else
            echo "No changes to commit"
          fi
