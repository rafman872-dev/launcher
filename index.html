<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>⚡ MEGA GITHUB LAUNCHER ⚡</title>
    <style>
        body { background: #08080a; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #00ff88; font-size: 32px; letter-spacing: 1px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        p.subtitle { text-align: center; color: #666; margin-top: 0; margin-bottom: 30px; font-size: 14px; }
        
        .search-container { max-width: 500px; margin: 0 auto 30px auto; display: flex; gap: 10px; }
        .search-input { flex: 1; background: #111116; border: 1px solid #222; padding: 12px 20px; border-radius: 30px; color: #fff; font-size: 16px; outline: none; transition: 0.2s; }
        .search-input:focus { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { background: #111116; color: #888; border: 1px solid #222; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .filter-btn.active, .filter-btn:hover { background: #00ff88; color: #000; border-color: #00ff88; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111116; border: 1px solid #1f1f26; border-radius: 12px; overflow: hidden; transition: 0.25s; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; height: 160px; }
        .card:hover { transform: translateY(-3px); border-color: #00ff88; box-shadow: 0 8px 25px rgba(0, 255, 136, 0.15); }
        .card h3 { font-size: 16px; margin: 0 0 10px 0; color: #eee; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; height: 44px; }
        .tags { display: flex; gap: 5px; }
        .tag { background: rgba(0, 255, 136, 0.08); color: #00ff88; padding: 4px 10px; border-radius: 6px; font-size: 11px; border: 1px solid rgba(0,255,136,0.15); font-weight: 600; }
        .bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .btn { background: #00ff88; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; text-decoration: none; transition: 0.2s; font-size: 13px; text-align: center; }
        .btn:hover { background: #fff; transform: scale(1.03); }
        
        .load-more-container { text-align: center; margin-top: 40px; }
        .load-more-btn { background: none; border: 2px solid #00ff88; color: #00ff88; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; display: none; }
        .load-more-btn:hover { background: #00ff88; color: #000; }

        .error-box { max-width: 500px; margin: 20px auto; padding: 15px; background: rgba(255,68,68,0.1); border: 1px solid #ff4444; border-radius: 8px; color: #ff6666; font-size: 14px; display: none; }
        .stats { text-align: center; color: #444; font-size: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚡ МОЙ СВЕРХБЫСТРЫЙ ЛАУНЧЕР ⚡</h1>
        <p class="subtitle">Полная база раздач (Турбо-режим)</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск игры по названию..." oninput="handleSearch()">
        </div>

        <div class="filter-bar" id="filterBar">
            <button class="filter-btn active" onclick="filterGames('all', this)">Все игры</button>
            <button class="filter-btn" onclick="filterGames('heavy', this)">Тяжелые (>50 GB)</button>
            <button class="filter-btn" onclick="filterGames('light', this)">Легкие (<50 GB)</button>
        </div>

        <div id="stats" class="stats">Загрузка базы данных...</div>
        <div id="errorLog" class="error-box"></div>
        <div class="grid" id="catalog"></div>

        <div class="load-more-container">
            <button id="loadMoreBtn" class="load-more-btn" onclick="renderNextChunk()">Показать еще игры</button>
        </div>
    </div>

    <script>
        // Убедись, что имя файла совпадает с тем, что ты загрузил на GitHub
        const DATABASE_URL = 'games.json';

        let allGames = [];
        let filteredGames = [];
        let currentIndex = 0;
        const CHUNK_SIZE = 60; // Сколько игр показывать за один раз
        let currentFilter = 'all';

        fetch(DATABASE_URL)
            .then(response => {
                if (!response.ok) throw new Error('Не удалось получить файл данных. Проверь имя файла.');
                return response.json();
            })
            .then(data => {
                allGames = data.downloads || data;
                // Убираем пустые объекты, если они есть
                allGames = allGames.filter(g => g && g.title);
                
                document.getElementById('stats').innerText = `Всего в базе: ${allGames.length} раздач`;
                
                // Изначально отображаем всё
                filteredGames = [...allGames];
                applyFilterAndSearch();
            })
            .catch(error => {
                const errBox = document.getElementById('errorLog');
                errBox.style.display = 'block';
                errBox.innerText = `Ошибка: ${error.message}. Убедись, что файл загружен через 'Upload files'`;
                document.getElementById('stats').innerText = `Ошибка загрузки.`;
            });

        function applyFilterAndSearch() {
            const searchTxt = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredGames = allGames.filter(game => {
                // Фильтр по поиску
                const matchSearch = game.title.toLowerCase().includes(searchTxt);
                if (!matchSearch) return false;

                // Фильтр по размеру
                if (currentFilter === 'all') return true;
                const sizeNum = parseFloat(game.fileSize) || 0;
                if (currentFilter === 'heavy') return sizeNum >= 50;
                if (currentFilter === 'light') return sizeNum < 50;
                return true;
            });

            // Сбрасываем счетчик отображения и рендерим заново
            currentIndex = 0;
            renderNextChunk(true);
        }

        function renderNextChunk(clearOld = false) {
            const catalogEl = document.getElementById('catalog');
            if (clearOld) catalogEl.innerHTML = '';

            const nextChunk = filteredGames.slice(currentIndex, currentIndex + CHUNK_SIZE);
            
            nextChunk.forEach(game => {
                if (!game.uris || game.uris.length === 0) return;
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div>
                        <h3 title="${game.title}">${game.title}</h3>
                        <div class="tags">
                            <span class="tag">${game.fileSize || '?? GB'}</span>
                        </div>
                    </div>
                    <div class="bottom-row">
                        <a href="${game.uris[0]}" class="btn">СКАЧАТЬ</a>
                    </div>
                `;
                catalogEl.appendChild(card);
            });

            currentIndex += CHUNK_SIZE;

            // Показываем или скрываем кнопку "Показать еще"
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (currentIndex < filteredGames.length) {
                loadMoreBtn.style.display = 'inline-block';
            } else {
                loadMoreBtn.style.display = 'none';
            }
        }

        function handleSearch() {
            applyFilterAndSearch();
        }

        function filterGames(criteria, buttonComponent) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(buttonComponent) buttonComponent.classList.add('active');
            currentFilter = criteria;
            applyFilterAndSearch();
        }
    </script>
</body>
</html>
