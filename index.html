<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>⚡ Game Launcher ⚡</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: linear-gradient(135deg, #08080a 0%, #0f0f15 100%); 
            color: #fff; font-family: 'Segoe UI', sans-serif; 
            padding: 20px; margin: 0; 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { text-align: center; color: #00ff88; font-size: 32px; letter-spacing: 1px; margin-bottom: 5px; text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        p.subtitle { text-align: center; color: #666; margin-top: 0; margin-bottom: 20px; font-size: 14px; }

        .search-container { max-width: 500px; margin: 0 auto 20px auto; display: flex; gap: 10px; }
        .search-input { flex: 1; background: #111116; border: 1px solid #222; padding: 12px 20px; border-radius: 30px; color: #fff; font-size: 16px; outline: none; }
        .search-input:focus { border-color: #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }

        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-btn { background: #111116; color: #888; border: 1px solid #222; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .filter-btn.active, .filter-btn:hover { background: #00ff88; color: #000; border-color: #00ff88; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #111116; border: 1px solid #1f1f26; border-radius: 12px; overflow: hidden; transition: 0.25s; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-3px); border-color: #00ff88; box-shadow: 0 8px 25px rgba(0, 255, 136, 0.15); }
        .card h3 { font-size: 16px; margin: 0 0 10px 0; color: #eee; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .tag { background: rgba(0, 255, 136, 0.08); color: #00ff88; padding: 4px 10px; border-radius: 6px; font-size: 11px; border: 1px solid rgba(0,255,136,0.15); font-weight: 600; }

        .btn { 
            background: #00ff88; color: #000; border: none; padding: 10px 20px; 
            font-weight: bold; border-radius: 6px; cursor: pointer; text-decoration: none; 
            transition: 0.2s; font-size: 13px; text-align: center; width: 100%;
        }
        .btn:hover { background: #fff; transform: scale(1.03); }

        .load-more-container { text-align: center; margin-top: 40px; }
        .load-more-btn { background: none; border: 2px solid #00ff88; color: #00ff88; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; display: none; }
        .load-more-btn:hover { background: #00ff88; color: #000; }

        .error-box { max-width: 500px; margin: 20px auto; padding: 15px; background: rgba(255,68,68,0.1); border: 1px solid #ff4444; border-radius: 8px; color: #ff6666; font-size: 14px; display: none; }
        .stats { text-align: center; color: #444; font-size: 12px; margin-bottom: 20px; }
        
        #gamepadDebug {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 12px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            max-width: 300px;
            z-index: 9999;
            max-height: 150px;
            overflow-y: auto;
        }
        
        #gamepadDebug.connected { border-color: #00ff88; background: rgba(0, 136, 68, 0.15); }
        #gamepadDebug.disconnected { border-color: #888; color: #888; background: rgba(0,0,0,0.5); }

        @media (max-width: 768px) {
            h1 { font-size: 24px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
            #gamepadDebug { font-size: 9px; padding: 8px; bottom: 5px; right: 5px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>⚡ GAME LAUNCHER ⚡</h1>
        <p class="subtitle">Торрент-база с быстрым доступом</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Поиск игры..." oninput="handleSearch()">
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterGames('all', this)">Все</button>
            <button class="filter-btn" onclick="filterGames('heavy', this)">Тяжелые (>50GB)</button>
            <button class="filter-btn" onclick="filterGames('light', this)">Легкие (<50GB)</button>
        </div>

        <div id="stats" class="stats">Загрузка базы...</div>
        <div id="errorLog" class="error-box"></div>
        <div class="grid" id="catalog"></div>

        <div class="load-more-container">
            <button id="loadMoreBtn" class="load-more-btn" onclick="renderNextChunk()">Показать еще</button>
        </div>
    </div>

    <!-- Отладка геймпада -->
    <div id="gamepadDebug" class="disconnected">
        Джойстик: не подключен
    </div>

    <script>
        const DATABASE_URL = 'games.json';
        
        let allGames = [];
        let filteredGames = [];
        let currentIndex = 0;
        let currentFilter = 'all';
        let selectedCardIndex = 0;
        let gamepadConnected = false;
        let gamepadLastTime = 0;
        const CHUNK_SIZE = 60;
        const GAMEPAD_POLL_INTERVAL = 50; // мс
        const STICK_DEADZONE = 0.3;

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        window.addEventListener('load', () => {
            loadGames();
            setupGamepadListener();
        });

        // ===== ЗАГРУЗКА ИГР =====
        function loadGames() {
            fetch(DATABASE_URL)
                .then(r => r.json())
                .then(data => {
                    allGames = (data.downloads || data).filter(g => g && g.title);
                    document.getElementById('stats').innerText = `Всего игр: ${allGames.length}`;
                    filteredGames = [...allGames];
                    applyFilterAndSearch();
                })
                .catch(err => {
                    document.getElementById('errorLog').style.display = 'block';
                    document.getElementById('errorLog').innerText = `Ошибка: ${err.message}`;
                });
        }

        function applyFilterAndSearch() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            
            filteredGames = allGames.filter(game => {
                if (!game.title.toLowerCase().includes(search)) return false;
                
                const size = parseFloat(game.fileSize) || 0;
                if (currentFilter === 'heavy') return size >= 50;
                if (currentFilter === 'light') return size < 50;
                return true;
            });

            currentIndex = 0;
            selectedCardIndex = 0;
            renderNextChunk(true);
        }

        function renderNextChunk(clearOld = false) {
            const catalog = document.getElementById('catalog');
            if (clearOld) catalog.innerHTML = '';

            const chunk = filteredGames.slice(currentIndex, currentIndex + CHUNK_SIZE);
            
            chunk.forEach((game, idx) => {
                if (!game.uris || !game.uris.length) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.setAttribute('data-index', currentIndex + idx);
                card.innerHTML = `
                    <div>
                        <h3>${game.title}</h3>
                        <div class="tags">
                            <span class="tag">${game.fileSize}</span>
                        </div>
                    </div>
                    <a href="${game.uris[0]}" class="btn">⬇ СКАЧАТЬ</a>
                `;
                catalog.appendChild(card);
            });

            currentIndex += CHUNK_SIZE;
            document.getElementById('loadMoreBtn').style.display = 
                currentIndex < filteredGames.length ? 'inline-block' : 'none';
            
            updateCardHighlight();
        }

        function handleSearch() {
            applyFilterAndSearch();
        }

        function filterGames(filter, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = filter;
            applyFilterAndSearch();
        }

        // ===== ГЕЙМПАД =====
        function setupGamepadListener() {
            window.addEventListener('gamepadconnected', (e) => {
                console.log('🎮 Джойстик подключен:', e.gamepad.id);
                gamepadConnected = true;
                updateGamepadDisplay();
                pollGamepad();
            });

            window.addEventListener('gamepaddisconnected', (e) => {
                console.log('❌ Джойстик отключен');
                gamepadConnected = false;
                updateGamepadDisplay();
            });

            // Первоначальная проверка
            if (navigator.getGamepads().length > 0 && navigator.getGamepads()[0]) {
                gamepadConnected = true;
                updateGamepadDisplay();
                pollGamepad();
            }
        }

        function updateGamepadDisplay() {
            const debug = document.getElementById('gamepadDebug');
            if (gamepadConnected) {
                debug.classList.remove('disconnected');
                debug.classList.add('connected');
                const gp = navigator.getGamepads()[0];
                if (gp) {
                    debug.textContent = `✓ ${gp.id}\nЭкземпляр ${gp.index}`;
                }
            } else {
                debug.classList.remove('connected');
                debug.classList.add('disconnected');
                debug.textContent = `Джойстик: не подключен\n(Подключите и перезагрузите)`;
            }
        }

        function pollGamepad() {
            const now = performance.now();
            if (now - gamepadLastTime < GAMEPAD_POLL_INTERVAL) {
                requestAnimationFrame(pollGamepad);
                return;
            }
            gamepadLastTime = now;

            const gamepads = navigator.getGamepads();
            let anyConnected = false;

            for (let i = 0; i < gamepads.length; i++) {
                const gp = gamepads[i];
                if (!gp) continue;
                anyConnected = true;

                // D-Pad (кнопки 12-15)
                if (gp.buttons[12].pressed) moveSelection(-4); // ↑
                if (gp.buttons[13].pressed) moveSelection(4);   // ↓
                if (gp.buttons[14].pressed) changeFilter(-1);   // ← LB
                if (gp.buttons[15].pressed) changeFilter(1);    // → RB

                // Left Stick (оси 0, 1)
                if (Math.abs(gp.axes[1]) > STICK_DEADZONE) {
                    if (gp.axes[1] < -STICK_DEADZONE) moveSelection(-4);
                    if (gp.axes[1] > STICK_DEADZONE) moveSelection(4);
                }
                if (Math.abs(gp.axes[0]) > STICK_DEADZONE) {
                    if (gp.axes[0] < -STICK_DEADZONE) changeFilter(-1);
                    if (gp.axes[0] > STICK_DEADZONE) changeFilter(1);
                }

                // Кнопки действий
                if (gp.buttons[0].pressed) clickSelectedCard();    // A
                if (gp.buttons[3].pressed) clickSelectedCard();    // Y
                if (gp.buttons[6].pressed) scrollUp();             // LT
                if (gp.buttons[7].pressed) scrollDown();           // RT
                
                updateGamepadDisplay();
            }

            if (gamepadConnected || anyConnected) {
                requestAnimationFrame(pollGamepad);
            }
        }

        function moveSelection(offset) {
            selectedCardIndex = Math.max(0, Math.min(selectedCardIndex + offset, filteredGames.length - 1));
            updateCardHighlight();
        }

        function updateCardHighlight() {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => card.style.boxShadow = 'none');
            
            if (cards[selectedCardIndex]) {
                cards[selectedCardIndex].style.boxShadow = '0 0 30px rgba(0,255,136,0.8)';
                cards[selectedCardIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function clickSelectedCard() {
            const cards = document.querySelectorAll('.card');
            if (cards[selectedCardIndex]) {
                const btn = cards[selectedCardIndex].querySelector('.btn');
                if (btn) btn.click();
            }
        }

        function changeFilter(offset) {
            const filters = ['all', 'heavy', 'light'];
            const idx = filters.indexOf(currentFilter);
            const newIdx = (idx + offset + filters.length) % filters.length;
            const btn = document.querySelectorAll('.filter-btn')[newIdx];
            filterGames(filters[newIdx], btn);
        }

        function scrollUp() {
            document.querySelector('.grid').scrollBy({ top: -300, behavior: 'smooth' });
        }

        function scrollDown() {
            document.querySelector('.grid').scrollBy({ top: 300, behavior: 'smooth' });
        }
    </script>
</body>
</html>
</body>
</html>
